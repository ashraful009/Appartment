services:
  - type: web
    name: appartment-api
    runtime: node
    rootDir: server          # sub-directory inside the repo
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000           # Render injects $PORT automatically; this is just a fallback reference
      # ── Set the values below in the Render dashboard, NOT here ──
      # MONGO_URI
      # JWT_SECRET
      # CLIENT_URL          → your Vercel frontend URL, e.g. https://appartment.vercel.app
      # CLOUDINARY_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_SECRET_KEY
    healthCheckPath: /api/health
